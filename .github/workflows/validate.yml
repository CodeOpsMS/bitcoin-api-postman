name: Validate repository

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Validate repository files
        run: npm run validate

      - name: Verify Newman CLI wiring
        run: npm run newman:version

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Check shell scripts
        run: |
          sh -n scripts/wait-for-bitcoind.sh
          sh -n scripts/bootstrap-regtest-readonly.sh

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Start Bitcoin Core regtest node
        run: docker compose up -d bitcoind

      - name: Run Bitcoin Core regtest smoke checks
        run: |
          ./scripts/wait-for-bitcoind.sh
          ./scripts/bootstrap-regtest-readonly.sh

      - name: Stop Bitcoin Core regtest node
        if: always()
        run: docker compose down -v
